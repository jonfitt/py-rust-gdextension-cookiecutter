# CI for merge requests, default branch, and version tags (vX.Y.Z).
# Mirrors .github/workflows/ and scripts/linux/ci-check.sh.

stages:
  - test
  - release

default:
  interruptible: true

variables:
  CARGO_TERM_COLOR: always
  GD_CRATE: "{{ cookiecutter.gd_crate_name }}"
  GD_LIBRARY_BASE: "{{ cookiecutter.gd_library_base }}"
  PROJECT_SLUG: "{{ cookiecutter.project_slug }}"

rust-check:
  stage: test
  image: rust:bookworm
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - rustup component add rustfmt clippy
    - chmod +x scripts/linux/ci-check.sh
  script:
    - ./scripts/linux/ci-check.sh

.release-tag-rules:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/

verify-tag:
  extends: .release-tag-rules
  stage: release
  image: alpine/git:latest
  script:
    - git fetch origin "${CI_DEFAULT_BRANCH}"
    - |
      if ! git merge-base --is-ancestor "${CI_COMMIT_SHA}" "origin/${CI_DEFAULT_BRANCH}"; then
        echo "Tag commit ${CI_COMMIT_SHA} is not on ${CI_DEFAULT_BRANCH}"
        exit 1
      fi

release-linux:
  extends: .release-tag-rules
  stage: release
  needs: [verify-tag]
  image: rust:bookworm
  script:
    - cargo build -p "${GD_CRATE}" --release
  artifacts:
    name: linux-x86_64
    paths:
      - target/release/lib${GD_LIBRARY_BASE}.so
    expire_in: 1 week

# Windows and macOS jobs require runners with matching tags (GitLab.com: saas-windows-medium-amd64,
# saas-macos-medium-m1; self-hosted: windows / macos). Adjust tags for your GitLab instance.
release-windows:
  extends: .release-tag-rules
  stage: release
  needs: [verify-tag]
  tags:
    - saas-windows-medium-amd64
  before_script:
    - rustup default stable
  script:
    - cargo build -p "${GD_CRATE}" --release
  artifacts:
    name: windows-x86_64
    paths:
      - target/release/${GD_LIBRARY_BASE}.dll
    expire_in: 1 week

release-macos:
  extends: .release-tag-rules
  stage: release
  needs: [verify-tag]
  tags:
    - saas-macos-medium-m1
  before_script:
    - rustup default stable
  script:
    - cargo build -p "${GD_CRATE}" --release
  artifacts:
    name: macos-arm64
    paths:
      - target/release/lib${GD_LIBRARY_BASE}.dylib
    expire_in: 1 week

release-package:
  extends: .release-tag-rules
  stage: release
  image: debian:bookworm-slim
  needs:
    - job: release-linux
      artifacts: true
    - job: release-windows
      artifacts: true
    - job: release-macos
      artifacts: true
  before_script:
    - apt-get update
    - apt-get install -y zip perl
    - chmod +x scripts/linux/package-godot-release.sh
  script:
    - ./scripts/linux/package-godot-release.sh "${CI_COMMIT_TAG}" \
        "target/release/lib${GD_LIBRARY_BASE}.so" \
        "target/release/${GD_LIBRARY_BASE}.dll" \
        "target/release/lib${GD_LIBRARY_BASE}.dylib"
  artifacts:
    name: release-${CI_COMMIT_TAG}
    paths:
      - dist/
    expire_in: never
  release:
    tag_name: $CI_COMMIT_TAG
    name: Release $CI_COMMIT_TAG
    assets:
      paths:
        - dist/${PROJECT_SLUG}-*.zip
        - dist/${PROJECT_SLUG}-demo-*.zip
        - dist/checksums-*.txt
